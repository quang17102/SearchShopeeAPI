<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 420px;
      max-height: 580px;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      background: #ee4d2d;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #d73211; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      font-size: 12px;
      color: #666;
      margin: 8px 0 0;
      min-height: 16px;
    }
    #results {
      margin-top: 10px;
      overflow-y: auto;
      flex: 1;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }
    .product {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      text-decoration: none;
      color: inherit;
    }
    .product:hover { background: #fafafa; }
    .product img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #f5f5f5;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-size: 13px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .product-price {
      color: #ee4d2d;
      font-weight: 600;
      font-size: 13px;
    }
    .product-meta {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .empty-results {
      font-size: 12px;
      color: #999;
      text-align: center;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <label for="keyword">Từ khóa tìm kiếm</label>
  <input id="keyword" type="text" placeholder="Nhập từ khóa..." value="freeship9">
  <button id="btnSearch" type="button">Search Shopee</button>
  <p id="status"></p>
  <div id="results"></div>
  <script src="popup.js"></script>
</body>
</html>
